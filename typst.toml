[package]
name = "spaniel"
version = "0.0.1"
compiler = "0.14.0"
entrypoint = "src/lib.typ"
authors = ["TimeTravelPenguin <@TimeTravelPenguin>"]
license = "MIT"
description = "Pseudo-objects, interfaces, and generics in Typst"
repository = "https://github.com/TimeTravelPenguin/spaniel"
keywords = [
  "generic programming",
  "interfaces",
  "objects",
  "classes",
  "inheritance",
]
categories = ["integration", "scripting"]

# Tytanic test runner. `ppi` must match `PPI` in `tests/lib.typ` so that 32px
# sprite cells land on whole pixels. Comparison is exact (no per-pixel slack).
# [tool.tytanic]
# tests = "tests"
#
# [tool.tytanic.default]
# ppi = 300
# max-delta = 0
# max-deviations = 0
